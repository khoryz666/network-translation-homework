!
!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname Router
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
ip cef
!
!
!
!
ip auth-proxy max-nodata-conns 3
ip admission max-nodata-conns 3
!
ipv6 unicast-routing
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
! 
!
!
!
!
interface FastEthernet0/0
 ip address 192.168.1.254 255.255.255.0
 duplex auto
 speed auto
 ipv6 nat
!
interface FastEthernet0/1
 no ip address
 duplex auto
 speed auto
 ipv6 address 2000::1000/64
 ipv6 nat
!
ip forward-protocol nd
!
!
ip http server
no ip http secure-server
!
ipv6 nat v4v6 source 192.168.1.1 2001::1
ipv6 nat v4v6 source 192.168.1.2 2001::2
ipv6 nat v6v4 source 2000::1 192.168.2.1
ipv6 nat v6v4 source 2000::2 192.168.2.2
ipv6 nat prefix 2001::/96
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
line aux 0
line vty 0 4
 login
!
!
end
